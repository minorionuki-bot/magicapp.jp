<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Magic Calc">
<title>Magic Calc v25</title>
<!--
  設定はURLハッシュで渡す例:
  #dt=1&coll=0&eq=1&off=0&fY=1&fSY=1&fM=1&fD=1&fH=1&fMin=1&h24=1
  dt   : 1=日時モード 0=数値モード
  coll : 1=コレクティブ 0=通常
  eq   : フォースまでの=回数
  target: 数値フォースの目標値
  off  : 追加秒数
  fY fSY fM fD fH fMin h24 : 日時フォーマット
-->
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}

html,body{
  margin:0;padding:0;
  width:100%;height:100%;
  overflow:hidden;
  background:#000;
}

/* bodyではなくdiv#appにposition:fixedを使う（iOS Safari対応） */
#app{
  position:fixed;top:0;left:0;right:0;bottom:0;
  display:flex;flex-direction:column;
  overflow:hidden;
  background:#000;color:#fff;
  font-family:-apple-system,'SF Pro Display','Helvetica Neue',sans-serif;
}

/* ── 上部アイコン ── */
#top-bar{
  display:flex;justify-content:space-between;align-items:center;
  padding:max(env(safe-area-inset-top),10px) 13px 0;flex-shrink:0;
}
.top-icon{
  width:36px;height:36px;
  background:#121212;
  border:1px solid #2D2D2D;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.top-icon svg{width:18px;height:18px}
#top-bar .top-icon:first-child svg{width:27px;height:27px}

/* ── 表示エリア ── */
#display{
  flex:1;min-height:0;
  display:flex;flex-direction:column;
  align-items:flex-end;justify-content:flex-end;
  padding:0 13px 6px;overflow:hidden;
}
#hist-line{
  font-size:24px;font-weight:300;color:#888;
  white-space:nowrap;max-width:100%;
  overflow:hidden;text-align:right;
  line-height:1.2;
}
#main-disp{
  font-weight:300;color:#fff;
  white-space:nowrap;
  text-align:right;width:100%;
  line-height:1;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
#main-disp::-webkit-scrollbar{display:none}

/* ── ボタングリッド ── */
#btn-grid{
  display:grid;
  grid-template-columns:repeat(4, var(--bs));
  grid-template-rows:repeat(5, var(--bs));
  gap:12px;
  padding:0 13px 8px;
  flex-shrink:0;
}

/* ── ボタン共通 ── */
.btn{
  width:var(--bs);height:var(--bs);
  border-radius:50%;border:none;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;position:relative;
  -webkit-user-select:none;user-select:none;
  font-family:inherit;
}
.btn-lbl{pointer-events:none;line-height:1}

/* ── ダークボタン（数字） ── */
.btn-dark{
  background:#343434;
  box-shadow:inset 0 1px 0 #5A5A5A,inset 0 -1px 0 #2A2A2A,inset 0 0 0 1px #444;
  color:#fff;
}
.btn-dark:active{background:#737373;box-shadow:none}
.btn-dark .btn-lbl{font-size:38px}

/* ── グレーボタン（AC %  ⌫） ── */
.btn-gray{
  background:#5C5C5C;
  box-shadow:inset 0 1px 0 #7A7A7A,inset 0 -1px 0 #4A4A4A,inset 0 0 0 1px #666;
  color:#fff;
}
.btn-gray:active{background:#888;box-shadow:none}
.btn-gray .btn-lbl{font-size:38px}

/* ── オレンジボタン（演算子） ── */
.btn-orange{
  background:#FE9100;
  box-shadow:inset 0 1px 0 #FFAE30,inset 0 -1px 0 #D67A00,inset 0 0 0 1px #E88200;
  color:#fff;
}
.btn-orange:active{background:#FFC700;box-shadow:none}
.btn-orange .btn-lbl{font-size:43px}

/* 選択中の演算子（白背景・オレンジ文字） */
.btn-orange.hl{background:#fff;box-shadow:none;color:#FE9100}
.btn-orange.hl:active{background:rgba(255,255,255,0.75)}

/* ── インジケータドット（±ボタン） ── */
.ind-dot{
  position:absolute;
  width:5px;height:5px;border-radius:50%;
  background:rgba(255,255,255,0.55);
  left:50%;transform:translateX(-50%);
  pointer-events:none;
}
.ind-dot.up  {top:28%}
.ind-dot.down{top:62%}
</style>
</head>
<body>
<div id="app">

<!-- 上部アイコン -->
<div id="top-bar">
  <div class="top-icon">

<!-- ボタングリッド -->
<div id="btn-grid">

  <button class="btn btn-gray"   data-a="back"   ><span class="btn-lbl">⌫</span></button>

  <button class="btn btn-dark"   data-a="pm"  id="pm">

      <line x1="3"  y1="9"  x2="13" y2="9"  stroke-width="2.2"/>
      <line x1="8"  y1="4"  x2="8"  y2="14" stroke-width="2.2"/>
      <line x1="10" y1="24" x2="24" y2="2"  stroke-width="1.8"/>

  <button class="btn btn-dark"   data-a="d:0"><span class="btn-lbl">0</span></button>

  <button class="btn btn-orange" data-a="eq"  ><span class="btn-lbl">=</span></button>
</div>

</div><!-- /#app -->
<script>
'use strict';

// ────────────────────────────────────────────
// Supabase 設定
// ────────────────────────────────────────────
const SUPABASE_URL = 'https://pzohqibnxnxfjngpvtex.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB6b2hxaWJueG54ZmpuZ3B2dGV4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MzE5NjIsImV4cCI6MjA5NDMwNzk2Mn0.3MhcMlE5VIKjD9r6AWiBinV6igYjJVv3D9zqb3-o6Oc';

async function fetchSupabaseSettings(uuid) {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/magiccalc_settings?uuid=eq.${encodeURIComponent(uuid)}&select=settings`,
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
    );
    const data = await res.json();
    return data?.[0]?.settings ?? null;
  } catch(e) { return null; }
}

// ────────────────────────────────────────────
// ボタンサイズをCSSカスタムプロパティで設定
// SwiftUI: (vw - hPad*2 - gap*3) / 4  hPad=13 gap=12
// ────────────────────────────────────────────
document.documentElement.style.setProperty(
  '--bs', 'calc((100vw - 26px - 36px) / 4)'
);

// ────────────────────────────────────────────
// 設定（URLハッシュから読み込み）
// ────────────────────────────────────────────
function parseSettings() {
  const hash = location.hash.replace(/^#/, '');
  const p = new URLSearchParams(hash);
  const b = (k, d) => p.has(k) ? (p.get(k) !== '0' && p.get(k) !== 'false' && p.get(k) !== '') : d;

  // URLハッシュに設定キーがあればそれを使い、localStorageに保存する
  const KEYS = ['dt','coll','eq','target','off','fY','fSY','fM','fD','fH','fMin','h24'];
  if (KEYS.some(k => p.has(k))) {
    const cfg = {
      isDateTime  : b('dt',   true),
      collective  : b('coll', false),
      equalsN     : Math.max(1, parseInt(p.get('eq') || '1')),
      target      : parseFloat(p.get('target') || '100'),
      offsetSec   : parseInt(p.get('off') || '0'),
      fmtYear     : b('fY',   true),
      fmtShortYear: b('fSY',  true),
      fmtMonth    : b('fM',   true),
      fmtDay      : b('fD',   true),
      fmtHour     : b('fH',   true),
      fmtMinute   : b('fMin', true),
      use24h      : b('h24',  true),
    };
    try { localStorage.setItem('magic_cfg', JSON.stringify(cfg)); } catch(e) {}
    return cfg;
  }

  // localStorageに保存済み設定があれば使う
  try {
    const saved = localStorage.getItem('magic_cfg');
    if (saved) return JSON.parse(saved);
  } catch(e) {}

  // デフォルト（月日のみ）
  return {
    isDateTime: true, collective: false, equalsN: 1,
    target: 100, offsetSec: 0,
    fmtYear: false, fmtShortYear: true, fmtMonth: true, fmtDay: true,
    fmtHour: false, fmtMinute: false, use24h: true,
    numberEnabled: true,   numberCollective: false, numberEqualsN: 1,
    datetimeEnabled: true, datetimeCollective: false, datetimeEqualsN: 1,
  };
}
const CFG = parseSettings();

// アクティブモード（タップで切り替え可能。CFGの初期値を引き継ぐ）
let activeIsDateTime = CFG.isDateTime;
let normalMode = false;  // 6時=通常電卓モード（フォースなし）

// ────────────────────────────────────────────
// 電卓の状態
// ────────────────────────────────────────────
const S = {
  disp         : '0',    // 表示文字列
  firstVal     : null,   // 第1オペランド（number | null）
  op           : null,   // 保留中の演算子（文字列 | null）
  sreset       : false,  // 次の数字入力で表示をリセット
  dispIsTarget : false,  // フォースターゲット表示中（コンマなし）
  liveExpr     : '',     // 計算中の式（例: "5 + 3"）
  histExpr     : '',     // =後に小さく表示する式
  eqCount      : 0,      // =を押した累計回数（ACでリセット）
  hlOp    : null,      // ハイライト中の演算子
  // コレクティブモード
  phase     : 'normal',  // 'normal' | 'afterFirst' | 'replacing'
  frozen    : 0,         // フォースターゲット（数値）
  frozenStr : '',        // フォースターゲット（先頭ゼロ付き表示文字列）
  total     : 0,         // 1回目=時点の集計値
  collOp  : null,      // 不足分に使う演算子
  revealed: 0,         // 不足分の公開済み桁数
  indDir  : null,      // インジケーター方向: '+' | '−' | null
};

// ────────────────────────────────────────────
// ターゲット値の計算
// ────────────────────────────────────────────

// 先頭ゼロを保持した表示用文字列を返す（例: 月日=「0530」）
// アクティブモードのコレクティブ設定を返す
// 新フォーマット(numberCollective/datetimeCollective)が明示的にtrueの場合のみ採用し、
// それ以外（false / 未設定）は旧フォーマット(collective)を参照する
function getActiveCollective() {
  if (activeIsDateTime) {
    if (CFG.datetimeCollective === true) return true;
    return CFG.collective ?? false;
  } else {
    if (CFG.numberCollective === true) return true;
    return CFG.collective ?? false;
  }
}

function getActiveEqualsN() {
  if (activeIsDateTime) {
    return ('datetimeEqualsN' in CFG) ? (CFG.datetimeEqualsN ?? 1) : (CFG.equalsN ?? 1);
  } else {
    return ('numberEqualsN'   in CFG) ? (CFG.numberEqualsN   ?? 1) : (CFG.equalsN ?? 1);
  }
}

function getTargetStr() {
  if (!activeIsDateTime) return fmtNum(CFG.target);
  const d = new Date(Date.now() + CFG.offsetSec * 1000);
  let r = '';
  if (CFG.fmtYear) {
    const y = d.getFullYear();
    r += CFG.fmtShortYear
      ? String(y % 100).padStart(2, '0')
      : String(y).padStart(4, '0');
  }
  if (CFG.fmtMonth)  r += String(d.getMonth() + 1); // 月は先頭ゼロなし（5月→「5」）
  if (CFG.fmtDay)    r += String(d.getDate()).padStart(2, '0');
  if (CFG.fmtHour) {
    let h = d.getHours();
    if (!CFG.use24h && h > 12) h -= 12;
    r += String(h).padStart(2, '0');
  }
  if (CFG.fmtMinute) r += String(d.getMinutes()).padStart(2, '0');
  return r || '0';
}

// 計算に使う数値を返す
function getTarget() {
  if (!activeIsDateTime) return CFG.target;
  return parseFloat(getTargetStr()) || 0;
}

// ────────────────────────────────────────────
// 計算ユーティリティ
// ────────────────────────────────────────────
function compute(a, b, op) {
  switch (op) {
    case '+': return a + b;
    case '−': return a - b;
    case '×': return a * b;
    case '÷': return b !== 0 ? a / b : 0;
  }
  return b;
}

function reverseCompute(target, first, op) {
  switch (op) {
    case '+': return target - first;
    case '−': return first - target;
    case '×': return first !== 0 ? target / first : target;
    case '÷': return target !== 0 ? first / target : 0;
  }
  return target;
}

function fmtNum(v) {
  if (!isFinite(v)) return 'エラー';
  if (v === Math.round(v) && Math.abs(v) < 1e15) return String(Math.trunc(v));
  return parseFloat(v.toPrecision(8)).toString();
}

function fmtHist(v) {
  if (v === Math.round(v)) return addCommas(String(Math.trunc(v)));
  return parseFloat(v.toPrecision(4)).toString();
}

function digitCount(v) {
  return fmtNum(Math.abs(v)).replace(/[^0-9]/g, '').length;
}

// ────────────────────────────────────────────
// 通常の計算（=を押したときの基本処理）
// ────────────────────────────────────────────
function computeEquals() {
  const second = parseFloat(S.disp) || 0;
  if (S.op !== null && S.firstVal !== null) {
    const result = compute(S.firstVal, second, S.op);
    return { result, second };
  }
  // 演算子なし：単独値
  return { result: parseFloat(S.disp) || 0, second: parseFloat(S.disp) || 0 };
}

function afterEquals() {
  S.op      = null;
  S.hlOp    = null;
  S.sreset  = true;
  S.firstVal = null;
}

// ────────────────────────────────────────────
// フォース処理（通常モード）
// ────────────────────────────────────────────
function applyForce() {
  const second = parseFloat(S.disp) || 0;

  // S.liveExpr に入力通りの式が積み上がっているのでそれを使う
  // liveExprがない場合（equalsNの2回目以降など）は既存のhistExprを維持
  if (S.liveExpr) {
    S.histExpr = S.liveExpr + ' ' + fmtHist(second);
  } else if (!S.histExpr) {
    S.histExpr = fmtHist(second);
  }
  S.liveExpr     = '';
  S.disp         = getTargetStr();
  S.dispIsTarget = true; // フォースターゲット表示中
  afterEquals();
}

// ────────────────────────────────────────────
// 入力ハンドラ
// ────────────────────────────────────────────
function inputDigit(d) {
  // コレクティブ「replacing」フェーズ：不足分を1桁ずつ誘導
  if (getActiveCollective() && S.phase === 'replacing') {
    const shortfall = Math.abs(S.frozen - S.total);
    const sf = fmtNum(shortfall).replace(/[^0-9]/g, '');
    if (S.revealed >= sf.length) { S.hlOp = null; render(); return; }
    S.disp = S.revealed === 0 ? sf[S.revealed] : S.disp + sf[S.revealed];
    S.revealed++;
    S.sreset = false;
    S.hlOp = null;
    render(); return;
  }

  if (S.sreset) {
    if (!S.op && S.phase === 'normal') {
      // =後の新規入力：リセット（collectiveのafterFirst/replacingフェーズ中は維持）
      S.firstVal     = null;
      S.liveExpr     = '';
      S.histExpr     = '';
      S.eqCount      = 0;
      S.dispIsTarget = false;
    }
    S.disp = d;
    S.sreset = false;
  } else {
    S.disp = S.disp === '0' ? d : (S.disp.length < 15 ? S.disp + d : S.disp);
  }
  S.hlOp = null;
  render();
}

function inputOp(op) {
  // コレクティブ「afterFirst」フェーズ：演算子受付
  if (getActiveCollective() && S.phase === 'afterFirst') {
    S.collOp  = op;
    S.op      = op;
    S.hlOp    = op;
    S.sreset  = true;
    S.phase   = 'replacing';
    S.liveExpr = fmtHist(S.total) + ' ' + op;
    render(); return;
  }

  const cur = parseFloat(S.disp) || 0;

  if (S.op !== null && !S.sreset) {
    // 連続演算（チェーン計算）
    const res = compute(S.firstVal, cur, S.op);
    S.firstVal = res;
    S.disp     = fmtNum(res);
    S.liveExpr += ' ' + fmtHist(cur) + ' ' + op;
  } else if (S.firstVal === null) {
    // 最初の演算子
    S.firstVal = cur;
    S.liveExpr = fmtHist(cur) + ' ' + op;
  } else if (S.sreset && S.op !== null) {
    // 演算子の変更（連続押し）
    const last = S.liveExpr.lastIndexOf(' ');
    if (last >= 0) S.liveExpr = S.liveExpr.slice(0, last + 1) + op;
  } else {
    S.liveExpr = fmtHist(cur) + ' ' + op;
  }

  S.op     = op;
  S.hlOp   = op;
  S.sreset = true;
  render();
}

function inputEquals() {
  S.eqCount++;

  // 通常電卓モード（6時）: フォースなし、純粋な計算のみ
  if (normalMode) {
    const { result, second } = computeEquals();
    // S.liveExpr には入力通りの式が積み上がっているので末尾の数値を追記するだけ
    S.histExpr = S.liveExpr ? S.liveExpr + ' ' + fmtHist(second) : '';
    S.disp = fmtNum(result);
    S.liveExpr = '';
    afterEquals();
    render();
    return;
  }

  const activeCollective = getActiveCollective();
  const activeEqualsN    = getActiveEqualsN();

  if (activeCollective) {
    // ── コレクティブモード ──
    switch (S.phase) {
      case 'normal': {
        const { result, second } = computeEquals();
        if (S.eqCount < activeEqualsN) {
          // まだ発動しない：通常計算表示
          S.histExpr = S.liveExpr ? S.liveExpr + ' ' + fmtHist(second) : '';
          S.disp = fmtNum(result);
          S.liveExpr = '';
          afterEquals();
          break;
        }
        // 発動：コレクティブ開始
        S.disp      = fmtNum(result);
        S.liveExpr  = '';
        S.frozenStr = getTargetStr();
        S.frozen    = parseFloat(S.frozenStr) || 0;
        S.total     = result;
        const shortfall = S.frozen - S.total;
        S.indDir   = shortfall >= 0 ? '+' : '−';
        S.revealed = 0;
        S.histExpr = '';
        S.phase    = 'afterFirst';
        afterEquals();
        break;
      }
      case 'afterFirst':
        // 演算子待ち：無視
        break;
      case 'replacing': {
        // 完了：フォースターゲットを表示
        const sfVal = Math.abs(S.frozen - S.total);
        if (S.collOp) {
          const base = S.total;
          S.histExpr = fmtHist(base) + ' ' + S.collOp + ' ' + fmtHist(sfVal);
        } else { S.histExpr = ''; }
        S.disp         = S.frozenStr || fmtNum(S.frozen);
        S.dispIsTarget = true;
        S.liveExpr  = '';
        S.indDir    = null;
        S.collOp    = null;
        S.total     = 0;
        S.frozen    = 0;
        S.frozenStr = '';
        S.revealed  = 0;
        S.phase     = 'normal';
        S.eqCount   = 0;
        afterEquals();
        break;
      }
    }
  } else {
    // ── 通常フォースモード ──
    if (S.eqCount < activeEqualsN) {
      // まだ発動しない
      const { result, second } = computeEquals();
      S.histExpr = S.liveExpr ? S.liveExpr + ' ' + fmtHist(second) : '';
      S.disp     = fmtNum(result);
      S.liveExpr = '';
      afterEquals();
    } else {
      // フォース発動
      S.eqCount = 0;
      applyForce();
    }
  }
  render();
}

function inputDecimal() {
  if (S.sreset) { S.disp = '0.'; S.sreset = false; render(); return; }
  if (!S.disp.includes('.')) S.disp += '.';
  render();
}

function inputBack() {
  if (S.sreset) return;
  S.disp = S.disp.length > 1 ? S.disp.slice(0, -1) : '0';
  if (S.disp === '-') S.disp = '0';
  render();
}

function inputPlusMinus() {
  const v = parseFloat(S.disp);
  if (!isNaN(v)) S.disp = fmtNum(v * -1);
  render();
}

function inputPercent() {
  const v = parseFloat(S.disp);
  if (!isNaN(v)) S.disp = fmtNum(v / 100);
  render();
}

function clear() {
  Object.assign(S, {
    disp:'0', firstVal:null, op:null, sreset:false, dispIsTarget:false,
    liveExpr:'', histExpr:'', eqCount:0, hlOp:null,
    phase:'normal', frozen:0, frozenStr:'', total:0, collOp:null,
    revealed:0, indDir:null,
  });
  render();
}

// ────────────────────────────────────────────
// 表示ロジック
// ────────────────────────────────────────────
function getLiveExpr() {
  if (S.sreset && !S.op) return '';   // =後：liveなし
  if (!S.liveExpr)       return '';   // 式なし
  if (S.sreset)          return S.liveExpr;            // op直後
  return S.liveExpr + ' ' + addCommas(S.disp);  // 入力中
}

function getHistExpr() {
  return (S.sreset && !S.op) ? S.histExpr : '';
}

function addCommas(s) {
  const neg = s.startsWith('-');
  const body = neg ? s.slice(1) : s;
  const [int, dec] = body.split('.');
  const fmt = int.replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  const res = dec !== undefined ? fmt + '.' + dec : fmt;
  return neg ? '-' + res : res;
}

function formatDisplay(raw) {
  // 先頭ゼロがある場合はコンマなし
  if (raw.length > 1 && raw[0] === '0' && raw[1] !== '.') return raw;
  if (raw.includes('.')) {
    const [i, d] = raw.split('.');
    return addCommas(i) + '.' + d;
  }
  return addCommas(raw);
}

// ────────────────────────────────────────────
// レンダリング
// ────────────────────────────────────────────
const $hist = document.getElementById('hist-line');
const $main = document.getElementById('main-disp');
const $ac   = document.getElementById('ac');
const $pm   = document.getElementById('pm');
const $grid = document.getElementById('btn-grid');

function render() {
  const live = getLiveExpr();
  const hist = getHistExpr();

  // ── メイン表示 ──
  const mainFontSize = (s) => {
    const digits = s.replace(/[^0-9]/g, '').length;
    if (digits <= 9)  return '70px';
    if (digits <= 11) return '64px';
    return '58px';
  };
  if (live) {
    $main.textContent = live;
    $main.style.fontSize = '70px';
    $main.style.wordSpacing = '-0.15em';
    $hist.style.display = 'none';
  } else {
    $main.style.wordSpacing = '';
    const txt = formatDisplay(S.disp);
    $main.textContent = txt;
    $main.style.fontSize = mainFontSize(txt);

    if (hist) {
      $hist.textContent = hist;
      $hist.style.display = '';
    } else {
      $hist.style.display = 'none';
    }
  }
  // 右端（最新の数字）が常に見えるようにスクロール
  requestAnimationFrame(() => { $main.scrollLeft = $main.scrollWidth; });

  // ── AC / C ラベル ──
  $ac.querySelector('.btn-lbl').textContent =
    (S.disp === '0' && S.firstVal === null && !S.liveExpr) ? 'AC' : 'C';

  // ── 演算子ハイライト ──
  $grid.querySelectorAll('.btn-orange').forEach(b => {
    const a = b.dataset.a;
    b.classList.toggle('hl', a && a.startsWith('op:') && a.slice(3) === S.hlOp);
  });

  // ── インジケータドット（±ボタン）──
  $pm.querySelector('.ind-dot')?.remove();
  if (S.indDir) {
    const dot = document.createElement('div');
    dot.className = 'ind-dot ' + (S.indDir === '+' ? 'up' : 'down');
    $pm.appendChild(dot);
  }
}

// ────────────────────────────────────────────
// イベント配線
// ────────────────────────────────────────────
$grid.addEventListener('pointerdown', e => {
  const btn = e.target.closest('[data-a]');
  if (!btn) return;
  const a = btn.dataset.a;

  // コレクティブ replacing フェーズ中は = 以外どのボタンでも次の桁を進める
  if (getActiveCollective() && S.phase === 'replacing' && a !== 'eq') {
    inputDigit('0');
    return;
  }

  if      (a.startsWith('d:'))  inputDigit(a.slice(2));
  else if (a.startsWith('op:')) inputOp(a.slice(3));
  else if (a === 'eq')          inputEquals();
  else if (a === 'dec')         inputDecimal();
  else if (a === 'back')        inputBack();
  else if (a === 'clear')       clear();
  else if (a === 'pm')          inputPlusMinus();
  else if (a === 'pct')         inputPercent();
});

// ────────────────────────────────────────────
// 時計アイコン（モードインジケーター）
// 日時モード: 3時方向、数字モード: 9時方向
// ────────────────────────────────────────────
const $hh = document.getElementById('hh');
const $mh = document.getElementById('mh');

function setClockMode(isDateTime) {
  const cx = 12, cy = 12;
  // 時針: 通常=6時(180°)、日時=3時(90°)、数字=9時(270°)
  const hDeg = normalMode ? 180 : isDateTime ? 90 : 270;
  const hr = (hDeg * Math.PI / 180) - Math.PI / 2;
  $hh.setAttribute('x2', (cx + Math.cos(hr) * 4.2).toFixed(2));
  $hh.setAttribute('y2', (cy + Math.sin(hr) * 4.2).toFixed(2));
  // 分針: 常に12時方向（上向き）
  $mh.setAttribute('x2', cx.toFixed(2));
  $mh.setAttribute('y2', (cy - 6.3).toFixed(2));
}
setClockMode(activeIsDateTime);

// 時計タップでモード切り替え（アイドル状態のみ）
// サイクル: 6時(通常) → 9時(数字) → 3時(日時) → 6時(通常)…
const $clockBtn = document.querySelector('#top-bar .top-icon');
$clockBtn.addEventListener('click', () => {
  const isIdle = S.disp === '0' && S.firstVal === null && !S.liveExpr && S.phase === 'normal';
  if (!isIdle) return;
  if (normalMode) {
    // 6時 → 9時（数字フォース）
    normalMode = false;
    activeIsDateTime = false;
  } else if (!activeIsDateTime) {
    // 9時 → 3時（日時フォース）
    activeIsDateTime = true;
  } else {
    // 3時 → 6時（通常電卓）
    normalMode = true;
  }
  setClockMode(activeIsDateTime);
  clear();
});

// ────────────────────────────────────────────
// 初期描画
// ────────────────────────────────────────────
render();

// ────────────────────────────────────────────
// Supabase から設定を取得（?id=UUID がある場合）
// ────────────────────────────────────────────
(async () => {
  const uuid = new URLSearchParams(location.search).get('id');
  if (!uuid) return;
  const s = await fetchSupabaseSettings(uuid);
  if (!s) return;
  Object.assign(CFG, s);
  // 旧フォーマット(collective)と新フォーマット(numberCollective/datetimeCollective)の互換
  // Supabaseデータに per-mode キーがない場合は legacy collective にフォールバック
  if (!('numberCollective'   in s)) CFG.numberCollective   = s.collective ?? false;
  if (!('datetimeCollective' in s)) CFG.datetimeCollective = s.collective ?? false;
  if (!('numberEqualsN'      in s)) CFG.numberEqualsN      = s.equalsN    ?? 1;
  if (!('datetimeEqualsN'    in s)) CFG.datetimeEqualsN    = s.equalsN    ?? 1;
  activeIsDateTime = s.isDateTime ?? CFG.isDateTime;
  setClockMode(activeIsDateTime);
  try { localStorage.setItem('magic_cfg', JSON.stringify(CFG)); } catch(e) {}
  clear(); // 新しい設定で電卓をリセット
})();
</script>
</body>
</html>
