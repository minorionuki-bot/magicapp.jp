<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Magic Calc">
<link rel="apple-touch-icon" href="icon.png">
<title>Magic Calc v42</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}

html,body{
  margin:0;padding:0;
  width:100%;height:100%;
  overflow:hidden;
  background:#000;
}

#app{
  position:fixed;top:0;left:0;right:0;bottom:0;
  display:flex;flex-direction:column;
  overflow:hidden;
  background:#000;color:#fff;
  font-family:-apple-system,'SF Pro Display','Helvetica Neue',sans-serif;
}

/* ── 上部アイコン ── */
#top-bar{
  display:flex;justify-content:space-between;align-items:center;
  padding:max(env(safe-area-inset-top),10px) 13px 0;flex-shrink:0;
}
.top-icon{
  width:36px;height:36px;
  background:#121212;
  border:1px solid #2D2D2D;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.top-icon svg{width:18px;height:18px}
#top-bar .top-icon:first-child svg{width:27px;height:27px}

/* ── 表示エリア ── */
#display{
  flex:1;min-height:0;
  display:flex;flex-direction:column;
  align-items:flex-end;justify-content:flex-end;
  padding:0 13px 6px;overflow:hidden;
}
#hist-line{
  font-size:24px;font-weight:400;color:#888;
  white-space:nowrap;max-width:100%;
  overflow:hidden;text-align:right;
  line-height:1.2;
}
#main-disp{
  font-weight:400;color:#fff;
  white-space:nowrap;
  text-align:right;width:100%;
  line-height:1;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
#main-disp::-webkit-scrollbar{display:none}

/* ── ボタングリッド ── */
#btn-grid{
  display:grid;
  grid-template-columns:repeat(4, var(--bs));
  grid-template-rows:repeat(5, var(--bs));
  gap:12px;
  padding:0 13px 8px;
  flex-shrink:0;
}

/* ── ボタン共通 ── */
.btn{
  width:var(--bs);height:var(--bs);
  border-radius:50%;border:none;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;position:relative;
  -webkit-user-select:none;user-select:none;
  font-family:inherit;
}
.btn-lbl{pointer-events:none;line-height:1}

.btn-dark{
  background:#343434;
  box-shadow:inset 0 1px 0 #5A5A5A,inset 0 -1px 0 #2A2A2A,inset 0 0 0 1px #444;
  color:#fff;
}
.btn-dark:active{background:#737373;box-shadow:none}
.btn-dark .btn-lbl{font-size:38px}

.btn-gray{
  background:#5C5C5C;
  box-shadow:inset 0 1px 0 #7A7A7A,inset 0 -1px 0 #4A4A4A,inset 0 0 0 1px #666;
  color:#fff;
}
.btn-gray:active{background:#888;box-shadow:none}
.btn-gray .btn-lbl{font-size:38px}

.btn-orange{
  background:#FE9100;
  box-shadow:inset 0 1px 0 #FFAE30,inset 0 -1px 0 #D67A00,inset 0 0 0 1px #E88200;
  color:#fff;
}
.btn-orange:active{background:#FFC700;box-shadow:none}
.btn-orange .btn-lbl{font-size:43px}

.btn-orange.hl{background:#fff;box-shadow:none;color:#FE9100}
.btn-orange.hl:active{background:rgba(255,255,255,0.75)}

.ind-dot{
  position:absolute;
  width:5px;height:5px;border-radius:50%;
  background:rgba(255,255,255,0.55);
  left:50%;transform:translateX(-50%);
  pointer-events:none;
}
.ind-dot.up  {top:28%}
.ind-dot.down{top:62%}
</style>

<script>
'use strict';

// ────────────────────────────────────────────
// Supabase 設定
// ────────────────────────────────────────────
const SUPABASE_URL = 'https://hdsduwanvahbdznpzobp.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhkc2R1d2FudmFoYmR6bnB6b2JwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExNTkyMTMsImV4cCI6MjA5NjczNTIxM30.Io1QRszUUduvZR0kYVg_nHffNSYC2v9FXF5giSc9RR8';

async function fetchSupabaseSettings(uuid) {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/magiccalc_settings?uuid=eq.${encodeURIComponent(uuid)}&select=settings`,
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Cache-Control': 'no-cache' }, cache: 'no-store' }
    );
    const data = await res.json();
    return data?.[0]?.settings ?? null;
  } catch(e) { return null; }
}

// ────────────────────────────────────────────
// ボタンサイズ
// ────────────────────────────────────────────
document.documentElement.style.setProperty('--bs', 'calc((100vw - 26px - 36px) / 4)');

// ────────────────────────────────────────────
// ポジション設定（時計回り: 12→3→6→9）
// ────────────────────────────────────────────
const POS_ORDER = ["12", "3", "6", "9"];

function makePosDefault(mode) {
  return {
    enabled: true, mode,
    target: 100, collective: false, equalsN: 1,
    dtOffset: 0, dtFmtOrder: 0, dtUse24h: true,
    fmtYear: false, fmtSY: true, fmtMonth: true, fmtDay: true, fmtHour: false, fmtMinute: false,
  };
}

let posConfigs = {
  "12": makePosDefault("improvised"),
  "3":  makePosDefault("datetime"),
  "6":  makePosDefault("normal"),
  "9":  makePosDefault("number"),
};
let currentPos = "12";

// ────────────────────────────────────────────
// アクティブモード変数（switchToPos で同期）
// ────────────────────────────────────────────
let activeIsDateTime = false;
let normalMode   = false;
let improvedMode = false;

// ────────────────────────────────────────────
// アクティブ設定（switchToPos で posConfigs から更新）
// ────────────────────────────────────────────
const CFG = {
  target: 100, offsetSec: 0,
  fmtYear: false, fmtShortYear: true, fmtMonth: true, fmtDay: true,
  fmtHour: false, fmtMinute: false, use24h: true, fmtOrder: 0,
  collective: false, equalsN: 1,
};

function getActiveCollective() { return CFG.collective; }
function getActiveEqualsN()    { return CFG.equalsN; }

// ポジション切り替え: モード変数とCFGを同期
function switchToPos(pos) {
  currentPos = pos;
  const pc   = posConfigs[pos] ?? makePosDefault("number");
  const mode = pc.mode ?? "number";
  normalMode       = mode === "normal";
  improvedMode     = mode === "improvised";
  activeIsDateTime = mode === "datetime";
  CFG.target       = pc.target     ?? 100;
  CFG.collective   = pc.collective ?? false;
  CFG.equalsN      = Math.max(1, pc.equalsN ?? 1);
  CFG.offsetSec    = pc.dtOffset   ?? 0;
  CFG.fmtOrder     = pc.dtFmtOrder ?? 0;
  CFG.use24h       = pc.dtUse24h   ?? true;
  CFG.fmtYear      = pc.fmtYear    ?? false;
  CFG.fmtShortYear = pc.fmtSY      ?? true;
  CFG.fmtMonth     = pc.fmtMonth   ?? true;
  CFG.fmtDay       = pc.fmtDay     ?? true;
  CFG.fmtHour      = pc.fmtHour    ?? false;
  CFG.fmtMinute    = pc.fmtMinute  ?? false;
}

// 初期ポジション（12時 = 即興モード）
switchToPos("12");
console.log('[MagicCalc v42] initialized. currentPos:', currentPos, 'improvedMode:', improvedMode);

// ────────────────────────────────────────────
// 電卓の状態
// ────────────────────────────────────────────
const S = {
  disp         : '0',
  firstVal     : null,
  op           : null,
  sreset       : false,
  dispIsTarget : false,
  liveExpr     : '',
  histExpr     : '',
  eqCount      : 0,
  hlOp         : null,
  phase        : 'normal',
  frozen       : 0,
  frozenStr    : '',
  total        : 0,
  collOp       : null,
  revealed     : 0,
  indDir       : null,
  improvedTarget    : 0,
  improvedTargetSet : false,
};

// ────────────────────────────────────────────
// ターゲット値の計算
// ────────────────────────────────────────────
function getTargetStr() {
  if (improvedMode && S.improvedTargetSet) return fmtNum(S.improvedTarget);
  if (!activeIsDateTime) return fmtNum(CFG.target);
  const d = new Date(Date.now() + CFG.offsetSec * 1000);
  const yr = CFG.fmtShortYear
    ? String(d.getFullYear() % 100).padStart(2, '0')
    : String(d.getFullYear()).padStart(4, '0');
  const mo = String(d.getMonth() + 1).padStart(2, '0');
  const dy = String(d.getDate()).padStart(2, '0');
  let h = d.getHours();
  if (!CFG.use24h && h > 12) h -= 12;
  const hh = String(h).padStart(2, '0');
  const mi = String(d.getMinutes()).padStart(2, '0');
  const order = CFG.fmtOrder ?? 0;
  let parts = [];
  switch (order) {
    case 1:
      if (CFG.fmtMonth)  parts.push(mo);
      if (CFG.fmtDay)    parts.push(dy);
      if (CFG.fmtYear)   parts.push(yr);
      if (CFG.fmtHour)   parts.push(hh);
      if (CFG.fmtMinute) parts.push(mi);
      break;
    case 2:
      if (CFG.fmtDay)    parts.push(dy);
      if (CFG.fmtMonth)  parts.push(mo);
      if (CFG.fmtYear)   parts.push(yr);
      if (CFG.fmtHour)   parts.push(hh);
      if (CFG.fmtMinute) parts.push(mi);
      break;
    default:
      if (CFG.fmtYear)   parts.push(yr);
      if (CFG.fmtMonth)  parts.push(mo);
      if (CFG.fmtDay)    parts.push(dy);
      if (CFG.fmtHour)   parts.push(hh);
      if (CFG.fmtMinute) parts.push(mi);
      break;
  }
  return parts.join('') || '0';
}

function getTarget() {
  if (improvedMode && S.improvedTargetSet) return S.improvedTarget;
  if (!activeIsDateTime) return CFG.target;
  return parseFloat(getTargetStr()) || 0;
}

// ────────────────────────────────────────────
// 計算ユーティリティ
// ────────────────────────────────────────────
function compute(a, b, op) {
  switch (op) {
    case '+': return a + b;
    case '−': return a - b;
    case '×': return a * b;
    case '÷': return b !== 0 ? a / b : 0;
  }
  return b;
}

function reverseCompute(target, first, op) {
  switch (op) {
    case '+': return target - first;
    case '−': return first - target;
    case '×': return first !== 0 ? target / first : target;
    case '÷': return target !== 0 ? first / target : 0;
  }
  return target;
}

function fmtNum(v) {
  if (!isFinite(v)) return 'エラー';
  if (v === Math.round(v) && Math.abs(v) < 1e15) return String(Math.trunc(v));
  return parseFloat(v.toPrecision(8)).toString();
}

function fmtHist(v) {
  if (v === Math.round(v)) return addCommas(String(Math.trunc(v)));
  return parseFloat(v.toPrecision(4)).toString();
}

function computeEquals() {
  const second = parseFloat(S.disp) || 0;
  if (S.op !== null && S.firstVal !== null) {
    const result = compute(S.firstVal, second, S.op);
    return { result, second };
  }
  return { result: parseFloat(S.disp) || 0, second: parseFloat(S.disp) || 0 };
}

function afterEquals() {
  S.op      = null;
  S.hlOp    = null;
  S.sreset  = true;
  S.firstVal = null;
}

// ────────────────────────────────────────────
// フォース処理（通常モード）
// ────────────────────────────────────────────
function applyForce() {
  const second = parseFloat(S.disp) || 0;
  if (S.liveExpr) {
    S.histExpr = S.liveExpr + ' ' + fmtHist(second);
  } else if (!S.histExpr) {
    S.histExpr = fmtHist(second);
  }
  S.liveExpr     = '';
  S.disp         = getTargetStr();
  S.dispIsTarget = true;
  afterEquals();
}

// ────────────────────────────────────────────
// 入力ハンドラ
// ────────────────────────────────────────────
function inputDigit(d) {
  if (getActiveCollective() && S.phase === 'replacing') {
    const shortfall = Math.abs(S.frozen - S.total);
    const sf = fmtNum(shortfall).replace(/[^0-9]/g, '');
    if (S.revealed >= sf.length) { S.hlOp = null; render(); return; }
    S.disp = S.revealed === 0 ? sf[S.revealed] : S.disp + sf[S.revealed];
    S.revealed++;
    S.sreset = false;
    S.hlOp = null;
    render(); return;
  }

  if (S.sreset) {
    if (!S.op && S.phase === 'normal') {
      S.firstVal     = null;
      S.liveExpr     = '';
      S.histExpr     = '';
      S.eqCount      = 0;
      S.dispIsTarget = false;
    }
    S.disp = d;
    S.sreset = false;
  } else {
    S.disp = S.disp === '0' ? d : (S.disp.length < 15 ? S.disp + d : S.disp);
  }
  S.hlOp = null;
  render();
}

function inputOp(op) {
  // = 直後に演算子を押したとき: 式履歴をクリア
  if (S.sreset && S.op === null) {
    S.histExpr = '';
  }

  if (getActiveCollective() && S.phase === 'afterFirst') {
    S.collOp  = op;
    S.op      = op;
    S.hlOp    = op;
    S.sreset  = true;
    S.phase   = 'replacing';
    S.liveExpr = fmtHist(S.total) + ' ' + op;
    render(); return;
  }

  const cur = parseFloat(S.disp) || 0;

  if (S.op !== null && !S.sreset) {
    const res = compute(S.firstVal, cur, S.op);
    S.firstVal = res;
    S.disp     = fmtNum(res);
    S.liveExpr += ' ' + fmtHist(cur) + ' ' + op;
  } else if (S.firstVal === null) {
    S.firstVal = cur;
    S.liveExpr = fmtHist(cur) + ' ' + op;
  } else if (S.sreset && S.op !== null) {
    const last = S.liveExpr.lastIndexOf(' ');
    if (last >= 0) S.liveExpr = S.liveExpr.slice(0, last + 1) + op;
  } else {
    S.liveExpr = fmtHist(cur) + ' ' + op;
  }

  S.op     = op;
  S.hlOp   = op;
  S.sreset = true;
  render();
}

function inputEquals() {
  S.eqCount++;

  if (improvedMode && !S.improvedTargetSet) {
    const { result, second } = computeEquals();
    S.histExpr = S.liveExpr ? S.liveExpr + ' ' + fmtHist(second) : fmtHist(second);
    S.disp     = fmtNum(result);
    S.liveExpr = '';
    afterEquals();
    render();
    return;
  }

  if (normalMode) {
    const { result, second } = computeEquals();
    S.histExpr = S.liveExpr ? S.liveExpr + ' ' + fmtHist(second) : fmtHist(second);
    S.disp = fmtNum(result);
    S.liveExpr = '';
    afterEquals();
    render();
    return;
  }

  const activeCollective = getActiveCollective();
  const activeEqualsN    = getActiveEqualsN();

  if (activeCollective) {
    switch (S.phase) {
      case 'normal': {
        const { result, second } = computeEquals();
        if (S.eqCount < activeEqualsN) {
          S.histExpr = S.liveExpr ? S.liveExpr + ' ' + fmtHist(second) : fmtHist(second);
          S.disp = fmtNum(result);
          S.liveExpr = '';
          afterEquals();
          break;
        }
        S.disp      = fmtNum(result);
        const trigExpr = S.liveExpr ? S.liveExpr + ' ' + fmtHist(second) : fmtHist(second);
        S.liveExpr  = '';
        S.frozenStr = getTargetStr();
        S.frozen    = parseFloat(S.frozenStr) || 0;
        S.total     = result;
        const shortfall = S.frozen - S.total;
        S.indDir   = shortfall >= 0 ? '+' : '−';
        S.revealed = 0;
        S.histExpr = trigExpr;
        S.phase    = 'afterFirst';
        afterEquals();
        break;
      }
      case 'afterFirst':
        break;
      case 'replacing': {
        const sfVal = Math.abs(S.frozen - S.total);
        if (S.collOp) {
          S.histExpr = fmtHist(S.total) + ' ' + S.collOp + ' ' + fmtHist(sfVal);
        } else { S.histExpr = ''; }
        S.disp         = S.frozenStr || fmtNum(S.frozen);
        S.dispIsTarget = true;
        S.liveExpr  = '';
        S.indDir    = null;
        S.collOp    = null;
        S.total     = 0;
        S.frozen    = 0;
        S.frozenStr = '';
        S.revealed  = 0;
        S.phase     = 'normal';
        S.eqCount   = 0;
        afterEquals();
        break;
      }
    }
  } else {
    if (S.eqCount < activeEqualsN) {
      const { result, second } = computeEquals();
      S.histExpr = S.liveExpr ? S.liveExpr + ' ' + fmtHist(second) : fmtHist(second);
      S.disp     = fmtNum(result);
      S.liveExpr = '';
      afterEquals();
    } else {
      S.eqCount = 0;
      applyForce();
    }
  }
  render();
}

function inputDecimal() {
  if (S.sreset) { S.disp = '0.'; S.sreset = false; render(); return; }
  if (!S.disp.includes('.')) S.disp += '.';
  render();
}

function inputBack() {
  if (S.sreset) {
    if (S.op !== null) {
      S.disp     = fmtNum(S.firstVal ?? 0);
      S.op       = null;
      S.hlOp     = null;
      S.liveExpr = '';
      S.firstVal = null;
      S.sreset   = false;
      render();
    }
    return;
  }
  if (S.disp.length > 1) {
    S.disp = S.disp.slice(0, -1);
    if (S.disp === '-') S.disp = '0';
  } else {
    if (S.op !== null) {
      S.sreset = true;
    } else {
      S.disp = '0';
    }
  }
  render();
}

function inputPlusMinus() {
  const v = parseFloat(S.disp);
  if (!isNaN(v)) S.disp = fmtNum(v * -1);
  render();
}

function inputPercent() {
  const v = parseFloat(S.disp);
  if (!isNaN(v)) S.disp = fmtNum(v / 100);
  render();
}

function clear() {
  Object.assign(S, {
    disp:'0', firstVal:null, op:null, sreset:false, dispIsTarget:false,
    liveExpr:'', histExpr:'', eqCount:0, hlOp:null,
    phase:'normal', frozen:0, frozenStr:'', total:0, collOp:null,
    revealed:0, indDir:null,
    // 即興モード中はターゲットを保持（AC後も再利用できる）
    improvedTarget:    improvedMode ? S.improvedTarget    : 0,
    improvedTargetSet: improvedMode ? S.improvedTargetSet : false,
  });
  render();
}

// ────────────────────────────────────────────
// 表示ロジック
// ────────────────────────────────────────────
function getLiveExpr() {
  if (S.sreset && !S.op) return '';
  if (!S.liveExpr)       return '';
  if (S.sreset)          return S.liveExpr;
  return S.liveExpr + ' ' + addCommas(S.disp);
}

function getHistExpr() {
  return S.histExpr;
}

function addCommas(s) {
  const neg = s.startsWith('-');
  const body = neg ? s.slice(1) : s;
  const [int, dec] = body.split('.');
  const fmt = int.replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  const res = dec !== undefined ? fmt + '.' + dec : fmt;
  return neg ? '-' + res : res;
}

function formatDisplay(raw) {
  const neg = raw.startsWith('-');
  const body = neg ? raw.slice(1) : raw;
  const prefix = neg ? '-' : '';
  if (body.includes('.')) {
    const [i, d] = body.split('.');
    return prefix + addCommas(i.replace(/^0+/, '') || '0') + '.' + d;
  }
  return prefix + addCommas(body.replace(/^0+/, '') || '0');
}

// ────────────────────────────────────────────
// レンダリング
// ────────────────────────────────────────────
const $hist = document.getElementById('hist-line');
const $main = document.getElementById('main-disp');
const $ac   = document.getElementById('ac');
const $pm   = document.getElementById('pm');
const $grid = document.getElementById('btn-grid');

function render() {
  const live = getLiveExpr();
  const hist = getHistExpr();

  const effectiveCount = (s) => {
    const digits = (s.match(/\d/g) || []).length;
    const ops    = (s.match(/[+\-×÷]/g) || []).length;
    return digits + ops;
  };
  const mainFontSize = (s) => {
    const n = effectiveCount(s);
    if (n <= 8)  return '60px';
    if (n <= 9)  return '58px';
    if (n <= 10) return '56px';
    return '54px';
  };
  if (live) {
    $main.textContent = live;
    $main.style.fontSize = mainFontSize(live);
    $main.style.wordSpacing = '-0.15em';
  } else {
    $main.style.wordSpacing = '';
    const txt = formatDisplay(S.disp);
    $main.textContent = txt;
    $main.style.fontSize = mainFontSize(txt);
  }
  if (hist) {
    $hist.textContent = hist;
    $hist.style.display = 'block';
  } else {
    $hist.style.display = 'none';
  }
  requestAnimationFrame(() => { $main.scrollLeft = $main.scrollWidth; });

  $ac.querySelector('.btn-lbl').textContent =
    (S.disp === '0' && S.firstVal === null && !S.liveExpr) ? 'AC' : 'C';

  $grid.querySelectorAll('.btn-orange').forEach(b => {
    const a = b.dataset.a;
    b.classList.toggle('hl', a && a.startsWith('op:') && a.slice(3) === S.hlOp);
  });

  // グリッドアイコン中央ブロック: 即興モードでターゲット設定済みなら塗りつぶし
  const $gc = document.getElementById('grid-center');
  if ($gc) $gc.setAttribute('fill', (improvedMode && S.improvedTargetSet) ? 'white' : 'none');

  $pm.querySelector('.ind-dot')?.remove();
  if (S.indDir) {
    const dot = document.createElement('div');
    dot.className = 'ind-dot ' + (S.indDir === '+' ? 'up' : 'down');
    $pm.appendChild(dot);
  }
}

// ────────────────────────────────────────────
// イベント配線
// ────────────────────────────────────────────
let eqLongPressTimer = null;

$grid.addEventListener('pointerdown', e => {
  const btn = e.target.closest('[data-a]');
  if (!btn) return;
  const a = btn.dataset.a;

  // 即興モードで = 長押し（800ms）: ターゲットをセット
  if (improvedMode && a === 'eq' && S.phase !== 'replacing') {
    eqLongPressTimer = setTimeout(() => {
      eqLongPressTimer = null;
      const target = parseFloat(S.disp);
      if (isNaN(target) || S.disp === '0') return;
      Object.assign(S, {
        disp:'0', firstVal:null, op:null, sreset:false, dispIsTarget:false,
        liveExpr:'', histExpr:'', eqCount:0, hlOp:null, phase:'normal',
        frozen:0, frozenStr:'', total:0, collOp:null, revealed:0, indDir:null,
        improvedTarget: target, improvedTargetSet: true,
      });
      render();
    }, 800);
    return;
  }

  if (getActiveCollective() && S.phase === 'replacing') {
    const sfVal = Math.abs(S.frozen - S.total);
    const sf = fmtNum(sfVal).replace(/[^0-9]/g, '');
    if (S.revealed < sf.length) {
      inputDigit('0');
      return;
    }
    if (a !== 'eq') return;
  }

  if      (a.startsWith('d:'))  inputDigit(a.slice(2));
  else if (a.startsWith('op:')) inputOp(a.slice(3));
  else if (a === 'eq')          inputEquals();
  else if (a === 'dec')         inputDecimal();
  else if (a === 'back')        inputBack();
  else if (a === 'clear')       clear();
  else if (a === 'pm')          inputPlusMinus();
  else if (a === 'pct')         inputPercent();
});

$grid.addEventListener('pointerup', e => {
  if (eqLongPressTimer !== null) {
    clearTimeout(eqLongPressTimer);
    eqLongPressTimer = null;
    inputEquals();
  }
});
$grid.addEventListener('pointercancel', e => {
  if (eqLongPressTimer !== null) {
    clearTimeout(eqLongPressTimer);
    eqLongPressTimer = null;
  }
});

// ────────────────────────────────────────────
// 時計アイコン（モードインジケーター）
// 12時=0°(即興) 3時=90°(日時) 6時=180°(通常) 9時=270°(数字)
// ────────────────────────────────────────────
const $hh       = document.getElementById('hh');
const $mh       = document.getElementById('mh');

function setClockMode() {
  const cx = 12, cy = 12;
  // 時針角度: ポジション基準（モードではなく位置で決定）
  const posAngles = { "12": 0, "3": 90, "6": 180, "9": 270 };
  const hDeg = posAngles[currentPos] ?? 270;
  const hr = (hDeg * Math.PI / 180) - Math.PI / 2;
  $hh.setAttribute('x2', (cx + Math.cos(hr) * 4.2).toFixed(2));
  $hh.setAttribute('y2', (cy + Math.sin(hr) * 4.2).toFixed(2));
  $mh.setAttribute('x2', cx.toFixed(2));
  $mh.setAttribute('y2', (cy - 6.3).toFixed(2));
}
setClockMode();

// 時計タップ: 時計回り 12→3→6→9→12（無効ポジションはスキップ）
const $clockBtn = document.querySelector('#top-bar .top-icon');
$clockBtn.addEventListener('click', () => {
  const wasImproved = improvedMode;
  const idx = POS_ORDER.indexOf(currentPos);
  let nextIdx = (idx + 1) % POS_ORDER.length;
  let steps = 0;
  while (!(posConfigs[POS_ORDER[nextIdx]]?.enabled ?? true)) {
    nextIdx = (nextIdx + 1) % POS_ORDER.length;
    if (++steps >= POS_ORDER.length) return;
  }
  const nextPos     = POS_ORDER[nextIdx];
  const nextImproved = (posConfigs[nextPos]?.mode === "improvised");

  switchToPos(nextPos);

  // 即興モードの往来でターゲットリセット
  if (wasImproved || nextImproved) {
    S.improvedTarget = 0; S.improvedTargetSet = false;
  }

  setClockMode();
  S.eqCount      = 0;
  S.phase        = 'normal';
  S.frozen       = 0;
  S.frozenStr    = '';
  S.total        = 0;
  S.collOp       = null;
  S.revealed     = 0;
  S.indDir       = null;
  S.hlOp         = null;
  S.dispIsTarget = false;
  render();
});

// ────────────────────────────────────────────
// 初期描画
// ────────────────────────────────────────────
render();

// ────────────────────────────────────────────
// Supabase から設定を取得して適用
// ────────────────────────────────────────────
(async () => {
  let uuid = new URLSearchParams(location.search).get('id');
  if (uuid) {
    try { localStorage.setItem('magic_uuid', uuid); } catch(e) {}
  } else {
    try { uuid = localStorage.getItem('magic_uuid'); } catch(e) {}
  }
  if (!uuid) return;
  const s = await fetchSupabaseSettings(uuid);
  console.log('[MagicCalc] Supabase settings:', JSON.stringify(s));
  if (!s) return;

  if (s.positions) {
    // ── 新フォーマット（positions キーあり）──
    for (const key of POS_ORDER) {
      const p = s.positions[key];
      if (!p) continue;
      posConfigs[key] = {
        enabled    : p.enabled    ?? true,
        mode       : p.mode       ?? "normal",
        target     : p.target     ?? 100,
        collective : p.collective ?? false,
        equalsN    : Math.max(1, p.equalsN ?? 1),
        dtOffset   : p.dtOffset   ?? 0,
        dtFmtOrder : p.dtFmtOrder ?? 0,
        dtUse24h   : p.dtUse24h   ?? true,
        fmtYear    : p.fmtYear    ?? false,
        fmtSY      : p.fmtShortYear ?? true,
        fmtMonth   : p.fmtMonth   ?? true,
        fmtDay     : p.fmtDay     ?? true,
        fmtHour    : p.fmtHour    ?? false,
        fmtMinute  : p.fmtMinute  ?? false,
      };
    }
    // 有効な最初のポジション（12→3→6→9 順）からスタート
    const startPos = POS_ORDER.find(k => posConfigs[k]?.enabled ?? true) ?? "12";
    switchToPos(startPos);

  } else {
    // ── レガシーフォーマット（positions キーなし）──
    const numColl = s.numberCollective  ?? s.collective ?? false;
    const numEqN  = Math.max(1, s.numberEqualsN  ?? s.equalsN ?? 1);
    const dtColl  = s.datetimeCollective ?? s.collective ?? false;
    const dtEqN   = Math.max(1, s.datetimeEqualsN ?? s.equalsN ?? 1);

    posConfigs = {
      "12": { ...makePosDefault("improvised"), collective: numColl, equalsN: numEqN },
      "3":  {
        enabled: s.datetimeEnabled ?? true,
        mode: "datetime",
        target: 100, collective: dtColl, equalsN: dtEqN,
        dtOffset: s.offsetSec ?? 0, dtFmtOrder: s.fmtOrder ?? 0, dtUse24h: s.use24h ?? true,
        fmtYear: s.fmtYear ?? false, fmtSY: s.fmtShortYear ?? true,
        fmtMonth: s.fmtMonth ?? true, fmtDay: s.fmtDay ?? true,
        fmtHour: s.fmtHour ?? false, fmtMinute: s.fmtMinute ?? false,
      },
      "6":  makePosDefault("normal"),
      "9":  {
        enabled: s.numberEnabled ?? true,
        mode: "number",
        target: s.target ?? 100, collective: numColl, equalsN: numEqN,
        dtOffset: 0, dtFmtOrder: 0, dtUse24h: true,
        fmtYear: false, fmtSY: true, fmtMonth: true, fmtDay: true, fmtHour: false, fmtMinute: false,
      },
    };
    // isDateTime フラグで初期ポジション決定（レガシー互換）
    const wantDt  = s.isDateTime ?? false;
    const dtOn    = s.datetimeEnabled ?? true;
    const numOn   = s.numberEnabled   ?? true;
    let startPos  = wantDt && dtOn ? "3" : numOn ? "9" : "12";
    switchToPos(startPos);
  }

  S.improvedTarget = 0; S.improvedTargetSet = false;
  setClockMode();
  clear();
})();
</script>
